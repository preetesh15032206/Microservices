# DATABASE CONNECTION (Using flexible Environment Variables for Railway/Production)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ems_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HIBERNATE & JPA CONFIGURATION
# Auto-generate DB schema (use 'update' for dev, 'validate' for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# THYMELEAF SETTINGS
spring.thymeleaf.cache=false

# SERVER PORT (Render will inject the PORT env variable automatically)
server.port=${PORT:8080}

# LOGGING
logging.level.org.springframework.web=INFO
logging.level.com.cognizant=DEBUG
