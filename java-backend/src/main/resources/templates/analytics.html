<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Salary Analytics - EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <!-- Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-building me-2"></i>EMS Dashboard</a>
            
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Employees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/departments">Departments</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/analytics">Analytics</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/audit-logs">Audit Logs</a>
                    </li>
                </ul>
            </div>
            
            <div class="d-flex align-items-center text-white ms-auto">
                <span class="me-3">Welcome, <strong sec:authentication="name">User</strong></span>
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <h3 class="text-secondary mb-4"><i class="bi bi-bar-chart-fill me-2"></i> Salary Analytics</h3>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white">
                        <h5 class="mb-0 text-primary">Average Salary by Department</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="deptChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white">
                        <h5 class="mb-0 text-success">Employee Count by Salary Range</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="rangeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/analytics/salary-by-department')
            .then(res => res.json())
            .then(data => {
                const labels = data.map(d => d.dept);
                const values = data.map(d => d.avgSalary);
                
                new Chart(document.getElementById('deptChart'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Avg Salary ($)',
                            data: values,
                            backgroundColor: 'rgba(54, 162, 235, 0.6)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: { scales: { y: { beginAtZero: true } } }
                });
            });

        fetch('/api/analytics/salary-ranges')
            .then(res => res.json())
            .then(data => {
                const labels = data.map(d => d.range);
                const values = data.map(d => d.count);
                
                new Chart(document.getElementById('rangeChart'), {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: [
                                'rgba(255, 99, 132, 0.7)',
                                'rgba(255, 206, 86, 0.7)',
                                'rgba(75, 192, 192, 0.7)',
                                'rgba(153, 102, 255, 0.7)'
                            ],
                            borderWidth: 1
                        }]
                    }
                });
            });
    </script>
</body>
</html>
