<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Audit Logs - EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-building me-2"></i>EMS Dashboard</a>
            
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Employees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/departments">Departments</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/analytics">Analytics</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/audit-logs">Audit Logs</a>
                    </li>
                </ul>
            </div>
            
            <div class="d-flex align-items-center text-white ms-auto">
                <span class="me-3">Welcome, <strong sec:authentication="name">User</strong></span>
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container bg-white p-4 rounded shadow-sm border border-light">
        <h3 class="text-secondary mb-4"><i class="bi bi-shield-lock-fill me-2"></i> System Audit Logs</h3>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light text-secondary">
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Employee Affected</th>
                        <th>Performed By</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${#temporals.format(log.timestamp, 'MMM dd, yyyy ''at'' hh:mm a')}"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${log.action == 'CREATED'} ? 'bg-success' : 
                                                  (${log.action == 'UPDATED'} ? 'bg-info text-dark' : 
                                                  (${log.action == 'DELETED'} ? 'bg-danger' : 
                                                  (${log.action == 'DEACTIVATED'} ? 'bg-warning text-dark' : 'bg-primary')))"
                                  th:text="${log.action}"></span>
                        </td>
                        <td th:text="${log.employeeName}" class="fw-semibold"></td>
                        <td th:text="${log.performedBy}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Basic pagination for logs -->
        <div class="d-flex justify-content-between mt-3" th:if="${logs.totalPages > 1}">
            <a th:href="@{/audit-logs(page=${currentPage - 1})}" class="btn btn-outline-secondary btn-sm" th:classappend="${currentPage == 1} ? 'disabled' : ''">Previous</a>
            <a th:href="@{/audit-logs(page=${currentPage + 1})}" class="btn btn-outline-secondary btn-sm" th:classappend="${currentPage == logs.totalPages} ? 'disabled' : ''">Next</a>
        </div>
    </div>
</body>
</html>
