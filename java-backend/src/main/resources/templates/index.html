<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dashboard - Employee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-building me-2"></i>EMS Dashboard</a>
            
            <div class="d-flex align-items-center text-white ms-auto">
                <span class="me-3">Welcome, <strong sec:authentication="name">User</strong> 
                    <span class="badge bg-light text-primary ms-1" sec:authentication="principal.authorities[0]">Role</span>
                </span>
                
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container bg-white p-4 rounded shadow-sm border border-light">
        
        <div class="row mb-3 align-items-center">
            <div class="col-md-6">
                <h3 class="text-secondary"><i class="bi bi-people-fill me-2"></i> Employee Directory</h3>
            </div>
            <div class="col-md-6 text-end">
                <!-- Only Admin can see this button -->
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/showNewEmployeeForm}" class="btn btn-success">
                    <i class="bi bi-person-plus-fill me-1"></i> Add Employee
                </a>
            </div>
        </div>

        <hr>

        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle">
                <thead class="table-light text-secondary">
                    <tr>
                        <th width="20%">First Name</th>
                        <th width="20%">Last Name</th>
                        <th width="25%">Email Address</th>
                        <th width="15%">Department</th>
                        <th width="15%">Role/Designation</th>
                        <th width="10%" class="text-center" sec:authorize="hasRole('ADMIN')">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employee : ${listEmployees}">
                        <td th:text="${employee.firstName}" class="fw-semibold text-primary"></td>
                        <td th:text="${employee.lastName}"></td>
                        <td th:text="${employee.email}"></td>
                        <td><span class="badge bg-info text-dark" th:text="${employee.department}"></span></td>
                        <td th:text="${employee.designation}"></td>
                        <!-- Only Admin can execute modifications -->
                        <td class="text-center align-middle" sec:authorize="hasRole('ADMIN')">
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/showFormForUpdate/{id}(id=${employee.id})}" class="btn btn-outline-primary" title="Edit">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <a th:href="@{/deleteEmployee/{id}(id=${employee.id})}" class="btn btn-outline-danger" title="Delete"
                                   onclick="if(!confirm('Delete this employee record permanently?')) return false;">
                                    <i class="bi bi-trash-fill"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <!-- Empty State -->
                    <tr th:if="${#lists.isEmpty(listEmployees)}">
                        <td colspan="6" class="text-center py-4 text-muted">
                            <i class="bi bi-inbox fs-2 mb-2 d-block"></i> No employee records found in database.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
